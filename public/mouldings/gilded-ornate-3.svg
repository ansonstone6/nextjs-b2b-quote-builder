<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-label="Gilded Ornate 3 inch profile moulding">
  <defs>
    <linearGradient id="gild" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f3d27a"/>
      <stop offset="40%" stop-color="#c9982f"/>
      <stop offset="100%" stop-color="#7a5b18"/>
    </linearGradient>
    <radialGradient id="gildHi" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff1c2" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fff1c2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="140" fill="url(#gild)"/>
  <rect width="200" height="140" fill="url(#gildHi)"/>
  <!-- ornate inner ridges -->
  <path d="M20 20 L180 20 L180 120 L20 120 Z" fill="none" stroke="#7a5b18" stroke-width="1.5" opacity="0.7"/>
  <path d="M28 28 L172 28 L172 112 L28 112 Z" fill="none" stroke="#fff1c2" stroke-width="0.8" opacity="0.7"/>
  <path d="M36 36 L164 36 L164 104 L36 104 Z" fill="none" stroke="#7a5b18" stroke-width="1" opacity="0.7"/>
  <!-- subtle ornament dots -->
  <g fill="#7a5b18" opacity="0.55">
    <circle cx="50" cy="50" r="1.6"/>
    <circle cx="100" cy="46" r="1.6"/>
    <circle cx="150" cy="50" r="1.6"/>
    <circle cx="50" cy="94" r="1.6"/>
    <circle cx="100" cy="98" r="1.6"/>
    <circle cx="150" cy="94" r="1.6"/>
  </g>
</svg>
